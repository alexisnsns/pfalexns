name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *' # Every 3 days at 12:00 UTC (well under Supabase's 7-day pause window)
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          response=$(curl -X GET \
            "${SUPABASE_URL}/rest/v1/posts?select=id&limit=0" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Prefer: count=exact" \
            --fail --silent --show-error -w "\nHTTP Status: %{http_code}\n")
          echo "$response"

