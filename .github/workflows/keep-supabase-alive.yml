name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *' # Every 3 days at 12:00 UTC (well under Supabase's 7-day pause window)
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Writing generates real DATABASE activity, which is what resets
          # Supabase's 7-day pause timer (a read-only request does not reliably
          # count). Delete existing rows first so the table never grows beyond
          # the single row we just inserted.
          echo "Clearing old keepalive rows..."
          curl -X DELETE \
            "${SUPABASE_URL}/rest/v1/keepalive?id=gte.0" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Prefer: return=minimal" \
            --fail --silent --show-error -w "DELETE HTTP Status: %{http_code}\n"

          echo "Inserting fresh keepalive row..."
          curl -X POST \
            "${SUPABASE_URL}/rest/v1/keepalive" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}' \
            --fail --silent --show-error -w "POST HTTP Status: %{http_code}\n"

